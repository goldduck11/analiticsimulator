services:
  # 1. База данных
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Бэкенд (Quarkus)
  backend:
    build: ./server
    container_name: quarkus_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Переопределяем настройки из application.properties для Docker
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/mydatabase
      QUARKUS_DATASOURCE_USERNAME: myuser
      QUARKUS_DATASOURCE_PASSWORD: secret
      # Пути к ключам JWT внутри контейнера
      SMALLRYE_JWT_SIGN_KEY_LOCATION: /deployments/privateKeyPkcs8.pem
    ports:
      - "8080:8080"

  # 3. Фронтенд
  frontend:
    build: ./client
    container_name: web_client
    ports:
      - "3000:3000" # Предположим, фронт внутри слушает 80, а снаружи 3000
    depends_on:
      - backend